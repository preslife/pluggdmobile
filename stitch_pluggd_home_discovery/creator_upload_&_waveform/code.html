<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Creator Upload &amp; Waveform - Pluggd</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec7f13",
                        "background-light": "#f8f7f6",
                        "background-dark": "#09090b", 
                        "surface-dark": "#18181b",
                        "surface-light": "#ffffff",
                    },
                    fontFamily: {
                        "display": ["Spline Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar for webkit browsers */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #09090b; 
        }
        ::-webkit-scrollbar-thumb {
            background: #27272a; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3f3f46; 
        }
        
        /* Waveform simulation */
        .waveform-bar {
            display: inline-block;
            width: 4px;
            margin-right: 2px;
            background-color: #ec7f13;
            border-radius: 2px;
            animation: pulse 1.5s infinite ease-in-out;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.6; transform: scaleY(0.8); }
            50% { opacity: 1; transform: scaleY(1.2); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white antialiased">
<div class="relative flex h-full min-h-screen w-full flex-col overflow-x-hidden max-w-md mx-auto border-x border-zinc-800 shadow-2xl">
<!-- Top App Bar -->
<header class="sticky top-0 z-20 flex items-center bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-md p-4 justify-between border-b border-zinc-800">
<button class="text-zinc-400 hover:text-white transition-colors flex items-center justify-center p-2 -ml-2 rounded-full hover:bg-zinc-800/50">
<span class="material-symbols-outlined text-[24px]">close</span>
</button>
<h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-tight flex-1 text-center">New Upload</h2>
<button class="text-primary font-bold text-base hover:text-orange-400 transition-colors p-2 -mr-2">
                Post
            </button>
</header>
<main class="flex-1 flex flex-col p-4 gap-6">
<!-- Empty State / File Selector -->
<section class="flex flex-col">
<div class="flex flex-col items-center justify-center gap-4 rounded-xl border-2 border-dashed border-zinc-700 bg-surface-dark/30 hover:bg-surface-dark/50 hover:border-primary/50 transition-all cursor-pointer px-6 py-10 group">
<div class="size-12 rounded-full bg-zinc-800 flex items-center justify-center group-hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined text-zinc-400 group-hover:text-primary text-[24px]">cloud_upload</span>
</div>
<div class="flex flex-col items-center gap-1">
<p class="text-slate-900 dark:text-white text-base font-bold text-center">Tap to select audio file</p>
<p class="text-zinc-500 text-xs text-center font-medium">WAV, MP3, AIFF up to 50MB</p>
</div>
</div>
</section>
<!-- Waveform Processing Section -->
<section class="flex flex-col gap-2">
<div class="flex items-center justify-between px-1">
<h3 class="text-slate-900 dark:text-white text-sm font-bold uppercase tracking-wider text-opacity-80">Processing Audio</h3>
<span class="text-primary text-xs font-bold bg-primary/10 px-2 py-0.5 rounded-full">Creating Waveform</span>
</div>
<!-- Waveform Visualizer -->
<div class="relative w-full h-32 bg-surface-dark rounded-xl border border-zinc-800 overflow-hidden flex items-center justify-center px-4">
<!-- Grid Background -->
<div class="absolute inset-0 opacity-20" style="background-image: linear-gradient(#333 1px, transparent 1px), linear-gradient(90deg, #333 1px, transparent 1px); background-size: 20px 20px;"></div>
<!-- Waveform Bars -->
<div class="relative z-10 flex items-center justify-center h-16 gap-[2px] w-full">
<!-- Generating a visually appealing waveform pattern -->
<div class="waveform-bar h-4" style="animation-delay: 0.1s"></div>
<div class="waveform-bar h-6" style="animation-delay: 0.2s"></div>
<div class="waveform-bar h-3" style="animation-delay: 0.3s"></div>
<div class="waveform-bar h-8" style="animation-delay: 0.1s"></div>
<div class="waveform-bar h-12 bg-primary" style="animation-delay: 0.4s"></div>
<div class="waveform-bar h-6" style="animation-delay: 0.2s"></div>
<div class="waveform-bar h-10" style="animation-delay: 0.5s"></div>
<div class="waveform-bar h-14 bg-primary" style="animation-delay: 0.3s"></div>
<div class="waveform-bar h-8" style="animation-delay: 0.1s"></div>
<div class="waveform-bar h-4" style="animation-delay: 0.4s"></div>
<div class="waveform-bar h-10" style="animation-delay: 0.2s"></div>
<div class="waveform-bar h-16 bg-primary" style="animation-delay: 0.5s"></div>
<div class="waveform-bar h-12 bg-primary" style="animation-delay: 0.3s"></div>
<div class="waveform-bar h-8" style="animation-delay: 0.1s"></div>
<div class="waveform-bar h-4" style="animation-delay: 0.2s"></div>
<div class="waveform-bar h-10" style="animation-delay: 0.4s"></div>
<div class="waveform-bar h-14 bg-primary" style="animation-delay: 0.3s"></div>
<div class="waveform-bar h-6" style="animation-delay: 0.5s"></div>
<div class="waveform-bar h-3" style="animation-delay: 0.1s"></div>
<div class="waveform-bar h-8" style="animation-delay: 0.2s"></div>
<div class="waveform-bar h-12 bg-primary" style="animation-delay: 0.4s"></div>
<div class="waveform-bar h-5" style="animation-delay: 0.1s"></div>
<div class="waveform-bar h-2" style="animation-delay: 0.3s"></div>
</div>
</div>
<!-- Progress Bar -->
<div class="flex flex-col gap-2 mt-1">
<div class="flex justify-between items-end">
<p class="text-zinc-400 text-xs font-medium">Analyzing frequencies...</p>
<p class="text-primary text-sm font-bold">78%</p>
</div>
<div class="h-1.5 w-full bg-zinc-800 rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full transition-all duration-500 ease-out shadow-[0_0_10px_rgba(236,127,19,0.5)]" style="width: 78%;"></div>
</div>
</div>
</section>
<!-- Metadata Form -->
<section class="flex flex-col gap-5 pt-2">
<!-- Track Title -->
<div class="flex flex-col gap-2">
<label class="text-zinc-400 text-xs font-bold uppercase tracking-wider ml-1">Track Title</label>
<div class="relative group">
<input class="w-full bg-surface-dark border border-zinc-700 rounded-lg h-12 px-4 text-white placeholder-zinc-600 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all text-sm font-medium" placeholder="e.g. Midnight City (Remix)" type="text"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 text-zinc-500 pointer-events-none group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">music_note</span>
</div>
</div>
</div>
<!-- Genre Selector -->
<div class="flex flex-col gap-2">
<label class="text-zinc-400 text-xs font-bold uppercase tracking-wider ml-1">Primary Genre</label>
<div class="relative">
<select class="w-full bg-surface-dark border border-zinc-700 rounded-lg h-12 px-4 text-white focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary appearance-none transition-all text-sm font-medium">
<option disabled="" selected="" value="">Select a genre</option>
<option value="hiphop">Hip Hop</option>
<option value="electronic">Electronic</option>
<option value="rnb">R&amp;B</option>
<option value="pop">Pop</option>
</select>
<div class="absolute right-4 top-1/2 -translate-y-1/2 text-zinc-500 pointer-events-none">
<span class="material-symbols-outlined text-[20px]">expand_more</span>
</div>
</div>
</div>
<!-- Tags Input -->
<div class="flex flex-col gap-2">
<label class="text-zinc-400 text-xs font-bold uppercase tracking-wider ml-1">Tags</label>
<div class="relative">
<input class="w-full bg-surface-dark border border-zinc-700 rounded-lg h-12 px-4 text-white placeholder-zinc-600 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all text-sm font-medium" placeholder="#trap, #lofi, #instrumental" type="text"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 text-zinc-500 pointer-events-none">
<span class="material-symbols-outlined text-[20px]">tag</span>
</div>
</div>
<div class="flex flex-wrap gap-2 mt-1">
<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-zinc-800 text-zinc-300 border border-zinc-700">
                            #plugg
                            <button class="ml-1.5 inline-flex text-zinc-400 hover:text-white" type="button">
<span class="sr-only">Remove large option</span>
<span class="material-symbols-outlined text-[14px]">close</span>
</button>
</span>
<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-zinc-800 text-zinc-300 border border-zinc-700">
                            #producer
                            <button class="ml-1.5 inline-flex text-zinc-400 hover:text-white" type="button">
<span class="sr-only">Remove large option</span>
<span class="material-symbols-outlined text-[14px]">close</span>
</button>
</span>
</div>
</div>
<!-- Description Area -->
<div class="flex flex-col gap-2">
<label class="text-zinc-400 text-xs font-bold uppercase tracking-wider ml-1">Description</label>
<textarea class="w-full bg-surface-dark border border-zinc-700 rounded-lg min-h-[100px] p-4 text-white placeholder-zinc-600 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all text-sm font-medium resize-none" placeholder="Tell fans about your track..."></textarea>
</div>
</section>
</main>
<!-- Sticky Bottom Action -->
<div class="sticky bottom-0 z-20 p-4 bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-md border-t border-zinc-800">
<button class="w-full bg-primary hover:bg-orange-600 active:bg-orange-700 text-white font-bold text-base h-12 rounded-lg shadow-[0_0_15px_rgba(236,127,19,0.3)] transition-all flex items-center justify-center gap-2">
<span>Publish Track</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</div>
</div>
</body></html>
