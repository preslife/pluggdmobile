<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Biometric Security Unlock - Pluggd</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#ec7f13",
              "background-light": "#f8f7f6",
              "background-dark": "#221910",
            },
            fontFamily: {
              "display": ["Manrope", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            keyframes: {
                pulseSlow: {
                    '0%, 100%': { opacity: '1' },
                    '50%': { opacity: '0.6' },
                }
            },
            animation: {
                'pulse-slow': 'pulseSlow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            }
          },
        },
      }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex flex-col selection:bg-primary selection:text-white">
<!-- Main Container -->
<div class="relative flex flex-grow flex-col items-center justify-between w-full max-w-md mx-auto px-6 py-8 overflow-hidden">
<!-- Ambient Background Glow -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-80 h-80 bg-primary/10 rounded-full blur-[100px] pointer-events-none"></div>
<!-- Header: Logo -->
<div class="relative z-10 w-full flex justify-center pt-8">
<!-- Placeholder for Pluggd Logo - using a styled div to represent text logo if image fails or for semantics -->
<div class="flex items-center gap-2 opacity-90">
<span class="material-symbols-outlined text-white text-2xl">graphic_eq</span>
<span class="text-white font-bold text-xl tracking-wider uppercase">Pluggd</span>
</div>
</div>
<!-- Center Content: Biometric Icon & Prompt -->
<div class="relative z-10 flex flex-col items-center justify-center gap-8 w-full">
<!-- Icon Container with Glow Effect -->
<div class="relative flex items-center justify-center group cursor-pointer">
<!-- Outer Rings/Glow -->
<div class="absolute inset-0 bg-primary/20 rounded-full blur-2xl animate-pulse-slow"></div>
<div class="absolute inset-0 bg-primary/10 rounded-full scale-150 blur-3xl opacity-50"></div>
<!-- Main Icon -->
<span class="material-symbols-outlined text-[128px] text-primary relative z-10 drop-shadow-[0_0_25px_rgba(236,127,19,0.7)] transition-transform duration-500 group-hover:scale-105">
                    fingerprint
                </span>
<!-- Scanner Line Animation (Simulated with CSS) -->
<div class="absolute top-0 w-full h-1 bg-white/50 shadow-[0_0_10px_white] blur-[2px] animate-[ping_3s_linear_infinite_reverse] opacity-20 rounded-full"></div>
</div>
<!-- Text Content -->
<div class="flex flex-col items-center text-center space-y-2">
<h1 class="text-slate-900 dark:text-white tracking-tight text-[32px] font-bold leading-tight">
                    Unlock Pluggd
                </h1>
<p class="text-slate-500 dark:text-white/60 text-base font-normal leading-normal">
                    Scan to continue
                </p>
</div>
</div>
<!-- Bottom: Action Buttons -->
<div class="relative z-10 w-full flex flex-col gap-3 pb-8">
<!-- Primary Button -->
<button class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 bg-primary text-[#181411] text-lg font-bold leading-normal tracking-wide shadow-[0_0_20px_rgba(236,127,19,0.3)] hover:bg-[#ff9626] hover:shadow-[0_0_30px_rgba(236,127,19,0.5)] transition-all duration-300 active:scale-[0.98]">
<span class="mr-2 material-symbols-outlined text-[20px]">fingerprint</span>
<span>Use Fingerprint</span>
</button>
<!-- Secondary Button -->
<button class="flex w-full cursor-pointer items-center justify-center rounded-xl h-12 px-5 text-slate-600 dark:text-white/80 hover:bg-black/5 dark:hover:bg-white/5 transition-colors text-base font-medium leading-normal active:scale-[0.98]">
<span>Use Passcode</span>
</button>
</div>
</div>
</body></html>
