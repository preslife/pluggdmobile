<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Pluggd Login</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;family=Noto+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec7f13",
                        "background-light": "#f8f7f6",
                        "background-dark": "#221910", // Using the dark theme color
                        "surface-dark": "#2c2117", // Slightly lighter for inputs
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"],
                        "body": ["Noto Sans", "sans-serif"],
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white antialiased">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<!-- Background Pattern/Gradient (Optional subtle texture) -->
<div class="absolute inset-0 bg-gradient-to-b from-background-dark via-[#1a120b] to-black opacity-90 z-0 pointer-events-none"></div>
<!-- Content Container -->
<div class="relative z-10 flex flex-1 flex-col justify-center px-6 py-10 sm:px-10 max-w-md mx-auto w-full">
<!-- Logo Section -->
<div class="mb-12 text-center">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-primary/20 mb-6">
<span class="material-symbols-outlined text-4xl text-primary">equalizer</span>
</div>
<h1 class="text-primary tracking-tight text-5xl font-extrabold mb-2">Pluggd</h1>
<p class="text-white/60 text-lg font-medium">Log in to create &amp; connect</p>
</div>
<!-- Form Section -->
<div class="flex flex-col gap-5">
<!-- Email Input -->
<div class="flex flex-col gap-2">
<label class="text-primary text-sm font-bold uppercase tracking-wider ml-1">Email</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-white/40 group-focus-within:text-primary transition-colors">mail</span>
</div>
<input class="form-input flex w-full rounded-xl border-none bg-surface-dark/80 text-white placeholder:text-white/30 h-14 pl-12 pr-4 text-base font-medium focus:ring-2 focus:ring-primary focus:bg-surface-dark transition-all duration-200" placeholder="enter@email.com" type="email" value=""/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-2">
<label class="text-primary text-sm font-bold uppercase tracking-wider ml-1">Password</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-white/40 group-focus-within:text-primary transition-colors">lock</span>
</div>
<input class="form-input flex w-full rounded-xl border-none bg-surface-dark/80 text-white placeholder:text-white/30 h-14 pl-12 pr-12 text-base font-medium focus:ring-2 focus:ring-primary focus:bg-surface-dark transition-all duration-200" placeholder="••••••••" type="password" value=""/>
<div class="absolute inset-y-0 right-0 pr-4 flex items-center cursor-pointer">
<span class="material-symbols-outlined text-white/40 hover:text-white transition-colors">visibility_off</span>
</div>
</div>
</div>
<!-- Forgot Password -->
<div class="flex justify-end pt-1">
<a class="text-primary hover:text-primary/80 text-sm font-semibold transition-colors" href="#">Forgot Password?</a>
</div>
<!-- Login Button -->
<button class="mt-4 flex w-full cursor-pointer items-center justify-center rounded-xl bg-primary h-14 px-6 text-background-dark text-lg font-bold hover:bg-orange-500 active:scale-[0.98] transition-all shadow-[0_0_20px_rgba(236,127,19,0.3)]">
                    LOG IN
                </button>
</div>
<!-- Social Login / Divider -->
<div class="mt-8">
<div class="relative flex py-4 items-center">
<div class="flex-grow border-t border-white/10"></div>
<span class="flex-shrink-0 mx-4 text-white/40 text-xs uppercase tracking-widest font-bold">Or continue with</span>
<div class="flex-grow border-t border-white/10"></div>
</div>
<div class="flex gap-4 justify-center mt-4">
<button class="flex items-center justify-center w-14 h-14 rounded-full bg-surface-dark border border-white/5 hover:bg-white/10 transition-colors">
<!-- Abstract placeholder for Apple Logo -->
<span class="material-symbols-outlined text-white">ios</span>
</button>
<button class="flex items-center justify-center w-14 h-14 rounded-full bg-surface-dark border border-white/5 hover:bg-white/10 transition-colors">
<!-- Abstract placeholder for Google Logo -->
<div class="w-6 h-6 rounded-full border-2 border-white/60 flex items-center justify-center text-[10px] font-bold text-white/60">G</div>
</button>
</div>
</div>
<!-- Sign Up Link -->
<div class="mt-12 text-center">
<p class="text-white/60 text-sm">
                    Don't have an account? 
                    <a class="text-white font-bold underline decoration-primary decoration-2 underline-offset-4 hover:text-primary transition-colors ml-1" href="#">Sign Up</a>
</p>
</div>
</div>
</div>
</body></html>
