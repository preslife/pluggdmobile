<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Magic Link Sent Success</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Config -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec7f13",
                        "background-light": "#f8f7f6",
                        "background-dark": "#181411", /* Adjusted slightly darker to match 'premium black' context while staying within theme logic */
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings:
            'FILL' 1,
            'wght' 400,
            'GRAD' 0,
            'opsz' 48
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark min-h-screen flex flex-col items-center justify-center p-4">
<!-- Main Content Container -->
<div class="w-full max-w-[480px] flex flex-col items-center relative z-10">
<!-- Status Indicator / Icon -->
<div class="relative flex items-center justify-center mb-8">
<!-- Outer Glow Ring (Static Pulse Effect) -->
<div class="absolute w-32 h-32 rounded-full bg-primary/10"></div>
<!-- Middle Ring -->
<div class="absolute w-24 h-24 rounded-full bg-primary/20"></div>
<!-- Icon Container -->
<div class="relative w-16 h-16 rounded-full bg-primary flex items-center justify-center shadow-[0_0_20px_rgba(236,127,19,0.4)]">
<span class="material-symbols-outlined text-background-dark text-4xl">check</span>
</div>
</div>
<!-- Text Content -->
<div class="w-full text-center px-4 space-y-3">
<h1 class="text-gray-900 dark:text-white tracking-tight text-[32px] font-bold leading-tight">
                Check your email
            </h1>
<p class="text-gray-600 dark:text-gray-400 text-base font-normal leading-relaxed">
                We’ve sent a magic link to <span class="text-gray-900 dark:text-white font-bold">music_fan@pluggd.com</span>.<br/>Click it to log in instantly.
            </p>
</div>
<!-- Actions -->
<div class="w-full mt-10 space-y-3 px-2">
<!-- Primary Action -->
<button class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-lg h-14 px-5 bg-primary hover:bg-[#d67211] transition-colors text-[#181411] text-base font-bold leading-normal tracking-[0.015em] shadow-lg shadow-primary/20">
<span class="material-symbols-outlined mr-2 text-[20px]">mail</span>
<span class="truncate">Open Mail App</span>
</button>
<!-- Secondary Action -->
<button class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-lg h-12 px-4 bg-transparent hover:bg-white/5 transition-colors text-gray-500 dark:text-gray-400 text-sm font-bold leading-normal tracking-[0.015em]">
<span class="truncate">Didn't receive it? <span class="text-primary hover:underline">Resend Link</span></span>
</button>
</div>
</div>
<!-- Background Decorative Element (Abstract Gradient) -->
<div class="fixed top-0 left-0 w-full h-1/2 bg-gradient-to-b from-primary/5 to-transparent pointer-events-none z-0"></div>
</body></html>
