<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Pluggd - Role Selection</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Config -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#ec7f13",
              "background-light": "#f8f7f6",
              "background-dark": "#181411", /* Adjusted to match component deep black */
              "surface-dark": "#27211c",
              "surface-highlight": "#3a312a",
            },
            fontFamily: {
              "display": ["Spline Sans", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "2xl": "2rem", "full": "9999px"},
            backgroundImage: {
                'gradient-radial': 'radial-gradient(var(--tw-gradient-stops))',
            }
          },
        },
      }
    </script>
<style>
        body {
            font-family: "Spline Sans", sans-serif;
        }
        /* Custom scrollbar hide for clean mobile look */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-white transition-colors duration-300">
<div class="relative flex h-full min-h-screen w-full flex-col overflow-hidden max-w-md mx-auto shadow-2xl">
<!-- Background Effects -->
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-primary/10 blur-[100px] pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-primary/5 blur-[80px] pointer-events-none"></div>
<!-- Top Bar -->
<div class="flex items-center p-6 pb-2 justify-between z-10">
<button class="text-white/70 hover:text-white flex size-10 items-center justify-center rounded-full transition-colors hover:bg-white/5">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<div class="w-10"></div> <!-- Spacer for balance -->
</div>
<!-- Header Content -->
<div class="px-6 pt-4 pb-2 z-10">
<h1 class="text-white text-3xl font-bold leading-tight tracking-tight mb-2">Welcome to Pluggd</h1>
<p class="text-white/60 text-lg font-normal leading-normal">Choose your vibe to get started.</p>
</div>
<!-- Main Content: Role Selection -->
<div class="flex-1 flex flex-col justify-center gap-6 px-6 py-4 z-10">
<!-- Creator Card -->
<label class="group relative cursor-pointer">
<input class="peer sr-only" name="role" type="radio" value="creator"/>
<div class="relative flex items-center justify-between gap-5 rounded-2xl bg-surface-dark p-5 shadow-lg border-2 border-transparent transition-all duration-300 ease-out hover:bg-surface-highlight peer-checked:border-primary peer-checked:bg-surface-highlight peer-checked:shadow-[0_0_20px_rgba(236,127,19,0.15)]">
<!-- Icon Container -->
<div class="flex h-14 w-14 shrink-0 items-center justify-center rounded-xl bg-primary/10 text-primary peer-checked:bg-primary peer-checked:text-white transition-colors">
<span class="material-symbols-outlined text-[28px] group-hover:scale-110 transition-transform">graphic_eq</span>
</div>
<!-- Text Content -->
<div class="flex flex-col gap-1 flex-1">
<p class="text-primary text-xs font-semibold uppercase tracking-wider mb-0.5">For Artists</p>
<p class="text-white text-xl font-bold leading-tight">I am a Creator</p>
<p class="text-white/50 text-sm font-normal leading-snug">Share your sound, grow your audience, and get paid.</p>
</div>
<!-- Check Circle Indicator -->
<div class="h-6 w-6 rounded-full border-2 border-white/20 flex items-center justify-center peer-checked:border-primary peer-checked:bg-primary transition-all">
<span class="material-symbols-outlined text-white text-[16px] opacity-0 peer-checked:opacity-100 transition-opacity">check</span>
</div>
</div>
</label>
<!-- Fan Card -->
<label class="group relative cursor-pointer">
<input class="peer sr-only" name="role" type="radio" value="fan"/>
<div class="relative flex items-center justify-between gap-5 rounded-2xl bg-surface-dark p-5 shadow-lg border-2 border-transparent transition-all duration-300 ease-out hover:bg-surface-highlight peer-checked:border-primary peer-checked:bg-surface-highlight peer-checked:shadow-[0_0_20px_rgba(236,127,19,0.15)]">
<!-- Icon Container -->
<div class="flex h-14 w-14 shrink-0 items-center justify-center rounded-xl bg-white/5 text-white peer-checked:bg-primary peer-checked:text-white transition-colors">
<span class="material-symbols-outlined text-[28px] group-hover:scale-110 transition-transform">headphones</span>
</div>
<!-- Text Content -->
<div class="flex flex-col gap-1 flex-1">
<p class="text-white/40 text-xs font-semibold uppercase tracking-wider mb-0.5">For Listeners</p>
<p class="text-white text-xl font-bold leading-tight">I am a Fan</p>
<p class="text-white/50 text-sm font-normal leading-snug">Discover exclusive tracks and support artists you love.</p>
</div>
<!-- Check Circle Indicator -->
<div class="h-6 w-6 rounded-full border-2 border-white/20 flex items-center justify-center peer-checked:border-primary peer-checked:bg-primary transition-all">
<span class="material-symbols-outlined text-white text-[16px] opacity-0 peer-checked:opacity-100 transition-opacity">check</span>
</div>
</div>
</label>
</div>
<!-- Spacer -->
<div class="h-4"></div>
<!-- Bottom Action -->
<div class="p-6 pb-10 z-10 mt-auto">
<button class="w-full rounded-xl bg-primary px-6 py-4 text-base font-bold text-white shadow-lg shadow-primary/20 transition-transform active:scale-95 hover:bg-primary/90 flex items-center justify-center gap-2">
                Continue
                <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
<p class="mt-4 text-center text-xs text-white/30">
                By continuing, you agree to our <a class="underline hover:text-white/50" href="#">Terms of Service</a>
</p>
</div>
</div>
</body></html>
