<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Profile Editor Settings</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Config -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#ec7f13",
              "background-light": "#f8f7f6",
              "background-dark": "#221910",
              "surface-dark": "#2C241B", // Slightly lighter for inputs/cards
            },
            fontFamily: {
              "display": ["Spline Sans", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #221910; 
        }
        ::-webkit-scrollbar-thumb {
            background: #3d3228; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #ec7f13; 
        }
        
        .material-symbols-outlined {
          font-variation-settings:
          'FILL' 1,
          'wght' 400,
          'GRAD' 0,
          'opsz' 24
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white antialiased overflow-x-hidden">
<!-- Main Container -->
<div class="relative flex flex-col w-full min-h-screen pb-24">
<!-- TopAppBar -->
<header class="sticky top-0 z-50 flex items-center justify-between px-4 py-4 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md">
<button class="flex items-center justify-center text-slate-900 dark:text-white size-10 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
<h2 class="text-lg font-bold leading-tight tracking-tight text-center flex-1">Edit Profile</h2>
<button class="flex items-center justify-center text-primary size-10 rounded-full hover:bg-primary/10 transition-colors font-medium text-sm">
<!-- Placeholder for symmetry or a 'Help' action if needed -->
</button>
</header>
<!-- Header Image & Profile Picture Section -->
<div class="relative w-full">
<!-- Header Image -->
<div class="@container w-full">
<div class="relative w-full h-48 sm:h-64 bg-cover bg-center bg-no-repeat bg-surface-dark" data-alt="Dark abstract geometric pattern with orange accents representing music waves" style="background-image: linear-gradient(180deg, rgba(34, 25, 16, 0.2) 0%, rgba(34, 25, 16, 0.8) 100%), url('https://lh3.googleusercontent.com/aida-public/AB6AXuArHaNK6ccMqvCKuemZmDYt-X-4z0XSKdqbuT_SP7SmctxTpzVrxKWR7nunknNDUWCm4UTx5gDinh_qSV54I5yP44mxqiZF23c3yn6ThSS_eLYZ1k6GrnpqqY14yBoX_wSnyQeSkxqFR7bF6vvgMRxS2YDNlc8SMXFuxiuIIZz6U0q0St5DOUS67tvhvYuaBUpXLus7frKOP5h-yDUr1Tvcq81x50L-42ql5YlnRLXSdwt5e97OvM17o17YqZNQewRLz4UgBJ670c0');">
<!-- Edit Cover Button -->
<button class="absolute top-4 right-4 bg-primary hover:bg-orange-600 text-white p-2 rounded-full shadow-lg transition-transform hover:scale-105 flex items-center justify-center group">
<span class="material-symbols-outlined text-[20px]">edit</span>
</button>
</div>
</div>
<!-- Avatar Overlay -->
<div class="relative flex justify-center -mt-16 px-4">
<div class="relative group cursor-pointer">
<!-- Avatar Image -->
<div class="size-32 rounded-full border-[6px] border-background-light dark:border-background-dark overflow-hidden bg-surface-dark shadow-xl">
<div class="w-full h-full bg-cover bg-center" data-alt="Profile picture of a music artist wearing sunglasses" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAkGakJlx7NTRvbMjAtVX0JSObVe_AfnhH0oG6Me59RlKABjcAAP3FLC0wcbwCvwcFy7ofyW7nU_aWz3pSORSFoscq7T3a0MddUx1WBj9HkutMuq5hEa_GDklpcG_Z-CLMJXV6VloBWGzIT5wWGYYr20bB3FzFywDfwntjxFcWrSURmaJeVe9H4rRP_gJZrfOXBx_81SdSyCoK_-iCBqkLKHVSl3cGHJqe_hHJDnj8U3US8H6VXYpz4rDyp-WmmAqSL0umH6-YuhyY');">
</div>
</div>
<!-- Edit Avatar Button -->
<button class="absolute bottom-1 right-1 bg-primary hover:bg-orange-600 text-white p-2.5 rounded-full shadow-lg border-[4px] border-background-light dark:border-background-dark flex items-center justify-center transition-transform hover:scale-105">
<span class="material-symbols-outlined text-[18px]">photo_camera</span>
</button>
</div>
</div>
<!-- Helper Text -->
<p class="text-slate-500 dark:text-gray-400 text-sm font-medium leading-normal pt-3 text-center">Tap icon to change photo</p>
</div>
<!-- Form Section -->
<div class="flex flex-col gap-6 px-4 pt-6 max-w-lg mx-auto w-full">
<!-- Headline -->
<h3 class="text-slate-900 dark:text-white tracking-tight text-xl font-bold leading-tight">Basic Info</h3>
<!-- Artist Name Input -->
<div class="group">
<label class="block text-xs font-semibold text-slate-500 dark:text-gray-400 uppercase tracking-wider mb-2 ml-1" for="artist-name">Artist Name</label>
<div class="relative flex items-center">
<input class="w-full bg-white dark:bg-surface-dark text-slate-900 dark:text-white border-none rounded-2xl px-4 py-4 focus:ring-2 focus:ring-primary focus:outline-none placeholder-slate-400 dark:placeholder-gray-600 text-base font-medium shadow-sm" id="artist-name" placeholder="Enter your artist name" type="text" value="The Weeknd"/>
<span class="material-symbols-outlined absolute right-4 text-slate-400 dark:text-gray-500 pointer-events-none text-[20px]">person</span>
</div>
</div>
<!-- Bio Input -->
<div class="group">
<label class="block text-xs font-semibold text-slate-500 dark:text-gray-400 uppercase tracking-wider mb-2 ml-1" for="bio">Bio</label>
<textarea class="w-full bg-white dark:bg-surface-dark text-slate-900 dark:text-white border-none rounded-2xl px-4 py-4 focus:ring-2 focus:ring-primary focus:outline-none placeholder-slate-400 dark:placeholder-gray-600 text-base font-medium shadow-sm resize-none" id="bio" placeholder="Tell your fans about yourself..." rows="3">Music producer &amp; artist based in Toronto. Creating dark r&amp;b vibes since 2011.</textarea>
</div>
<!-- Location Input -->
<div class="group">
<label class="block text-xs font-semibold text-slate-500 dark:text-gray-400 uppercase tracking-wider mb-2 ml-1" for="location">Location</label>
<div class="relative flex items-center">
<input class="w-full bg-white dark:bg-surface-dark text-slate-900 dark:text-white border-none rounded-2xl px-4 py-4 focus:ring-2 focus:ring-primary focus:outline-none placeholder-slate-400 dark:placeholder-gray-600 text-base font-medium shadow-sm" id="location" placeholder="City, Country" type="text" value="Toronto, Canada"/>
<span class="material-symbols-outlined absolute right-4 text-slate-400 dark:text-gray-500 pointer-events-none text-[20px]">location_on</span>
</div>
</div>
<!-- Divider -->
<div class="h-px w-full bg-slate-200 dark:bg-white/10 my-2"></div>
<!-- Social Links -->
<div>
<h3 class="text-slate-900 dark:text-white tracking-tight text-xl font-bold leading-tight mb-4">Connect Accounts</h3>
<div class="flex gap-4">
<!-- Instagram (Simulated with generic icon as per strict material symbols constraint or using closer matches) -->
<button class="size-14 rounded-full bg-white dark:bg-surface-dark flex items-center justify-center text-primary shadow-sm hover:bg-primary/20 transition-colors border-2 border-transparent hover:border-primary">
<!-- Using generic 'camera' or 'public' often used for social if brand icons unavailable in set, but Material Symbols has some generic shapes. 
                             Using 'photo_camera' as a proxy for Insta or generic link -->
<span class="material-symbols-outlined text-[28px]">captive_portal</span>
</button>
<!-- Discord (Chat bubble) -->
<button class="size-14 rounded-full bg-white dark:bg-surface-dark flex items-center justify-center text-slate-400 dark:text-gray-500 shadow-sm hover:bg-slate-100 dark:hover:bg-white/5 transition-colors border-2 border-transparent">
<span class="material-symbols-outlined text-[28px]">forum</span>
</button>
<!-- Mailchimp (Email) -->
<button class="size-14 rounded-full bg-primary flex items-center justify-center text-white shadow-lg shadow-primary/20 hover:bg-orange-600 transition-colors border-2 border-transparent">
<span class="material-symbols-outlined text-[28px]">mail</span>
</button>
<!-- Add New -->
<button class="size-14 rounded-full bg-transparent border-2 border-dashed border-slate-300 dark:border-gray-600 flex items-center justify-center text-slate-400 dark:text-gray-500 hover:border-primary hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[28px]">add</span>
</button>
</div>
</div>
<!-- Preferences -->
<div class="flex items-center justify-between py-2 bg-white dark:bg-surface-dark rounded-2xl px-5 mt-2">
<div class="flex items-center gap-3">
<div class="bg-primary/10 p-2 rounded-full text-primary">
<span class="material-symbols-outlined">public</span>
</div>
<div class="flex flex-col">
<span class="text-base font-bold text-slate-900 dark:text-white">Public Profile</span>
<span class="text-xs text-slate-500 dark:text-gray-400">Visible to everyone on Pluggd</span>
</div>
</div>
<!-- Toggle Switch -->
<label class="inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="relative w-12 h-7 bg-slate-200 dark:bg-black/40 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[4px] after:start-[4px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-primary"></div>
</label>
</div>
<div class="h-10"></div> <!-- Spacer for footer -->
</div>
<!-- Sticky Footer -->
<div class="fixed bottom-0 left-0 w-full p-4 bg-gradient-to-t from-background-light via-background-light to-transparent dark:from-background-dark dark:via-background-dark dark:to-transparent z-40 pb-6 pt-12">
<div class="max-w-lg mx-auto">
<button class="w-full bg-primary hover:bg-orange-600 text-white font-bold text-lg py-4 rounded-full shadow-lg shadow-primary/25 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
<span class="material-symbols-outlined">save</span>
                    Save Changes
                </button>
</div>
</div>
</div>
</body></html>
